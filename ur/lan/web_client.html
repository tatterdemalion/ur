<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0ece4">
  <title>The Royal Game of Ur</title>
  <style>
    :root {
      --bg:       #f0ece4;
      --surface:  #ffffff;
      --cell:     #e8e4dc;
      --cell-r:   #fdf6e3;
      --gap:      #ccc8c0;
      --border:   #d4d0c8;
      --gold:     #c09800;
      --gold-bd:  #d4b040;
      --text:     #1a1a1a;
      --muted:    #777;
      --dim:      #bbb;

      /* piece colours */
      --r-top:    #ff9090;
      --r-mid:    #d42020;
      --r-bot:    #8a0f0f;
      --r-shadow: rgba(160,10,10,.45);

      --c-top:    #88f4f4;
      --c-mid:    #00b8b8;
      --c-bot:    #006e6e;
      --c-shadow: rgba(0,140,140,.4);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 1.5rem 1rem;
      overscroll-behavior-y: none;
      padding-left:  max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Title ─────────────────────────────────────────── */
    .title {
      font-size: clamp(.75rem, 1.6vw, .95rem);
      letter-spacing: .55em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ── Main container ────────────────────────────────── */
    .wrap {
      width: min(96vw, 900px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,.12);
    }

    /* ── Scorebar ──────────────────────────────────────── */
    .scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .8rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
    }
    .player {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .9rem;
    }
    .player .label { color: var(--muted); font-size: .75rem; letter-spacing: .1em; }
    .player .pts   { font-size: .95rem; font-weight: bold; }
    .player .btxt  { color: var(--dim); font-size: .72rem; }
    .player.you .pts { color: var(--c-mid); }
    .player.opp .pts { color: var(--r-mid); }
    .vs { color: var(--dim); font-size: .85rem; }

    /* small inline circle for scorebar */
    .dot-sm {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-sm.cyan {
      background: radial-gradient(circle at 38% 32%, var(--c-top), var(--c-mid) 60%, var(--c-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.5), 0 1px 4px var(--c-shadow);
    }
    .dot-sm.red {
      background: radial-gradient(circle at 38% 32%, var(--r-top), var(--r-mid) 60%, var(--r-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.4), 0 1px 4px var(--r-shadow);
    }

    /* ── Board ─────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
      padding: 12px;
      background: var(--gap);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .cell {
      aspect-ratio: 1;
      background: var(--cell);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
      touch-action: manipulation;
      transition: background .12s, box-shadow .12s;
    }
    .cell.rosetta {
      background: var(--cell-r);
      box-shadow: inset 0 0 0 1.5px var(--gold-bd);
    }
    .cell.rosetta::before {
      content: '✿';
      position: absolute;
      font-size: .6em;
      color: var(--gold);
      opacity: .35;
      font-weight: normal;
      pointer-events: none;
    }
    .cell.missing {
      background: transparent;
      box-shadow: none;
      pointer-events: none;
    }
    .cell.valid {
      cursor: pointer;
      background: #d8f5f5;
      box-shadow: inset 0 0 0 2px var(--c-mid);
    }
    .cell.valid:hover { background: #c0eeee; }

    /* ── Pieces ────────────────────────────────────────── */
    .piece {
      width: 68%;
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .piece.p1 {
      background: radial-gradient(circle at 38% 30%, var(--r-top), var(--r-mid) 55%, var(--r-bot));
      box-shadow:
        inset 0 3px 6px rgba(255,255,255,.45),
        inset 0 -3px 5px rgba(0,0,0,.3),
        0 4px 10px var(--r-shadow);
    }
    .piece.p2 {
      background: radial-gradient(circle at 38% 30%, var(--c-top), var(--c-mid) 55%, var(--c-bot));
      box-shadow:
        inset 0 3px 6px rgba(255,255,255,.55),
        inset 0 -3px 5px rgba(0,0,0,.2),
        0 4px 10px var(--c-shadow);
    }
    /* on rosetta — brighter and stronger glow */
    .piece.p1.lit {
      background: radial-gradient(circle at 38% 30%, #ffb0b0, #f03030 50%, #aa1010);
      box-shadow:
        inset 0 3px 8px rgba(255,255,255,.6),
        inset 0 -3px 5px rgba(0,0,0,.25),
        0 5px 16px rgba(200,20,20,.55),
        0 0 22px rgba(255,80,80,.25);
    }
    .piece.p2.lit {
      background: radial-gradient(circle at 38% 30%, #a8ffff, #10cccc 50%, #008888);
      box-shadow:
        inset 0 3px 8px rgba(255,255,255,.7),
        inset 0 -3px 5px rgba(0,0,0,.15),
        0 5px 16px rgba(0,160,160,.5),
        0 0 22px rgba(0,200,200,.2);
    }

    /* ── Bench strip ───────────────────────────────────── */
    .bench-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 1.2rem;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-top: 1px solid var(--border);
      min-height: 2.4rem;
      gap: .5rem;
    }
    .bench-side {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .bench-lbl { color: var(--dim); font-size: .7rem; }

    /* bench circles */
    .bp {
      width: 16px; height: 16px;
      border-radius: 50%;
      cursor: default;
      touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      flex-shrink: 0;
    }
    .bp.p2c {
      background: radial-gradient(circle at 38% 32%, var(--c-top), var(--c-mid) 60%, var(--c-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.5), 0 1px 4px var(--c-shadow);
    }
    .bp.p1c {
      background: radial-gradient(circle at 38% 32%, var(--r-top), var(--r-mid) 60%, var(--r-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.4), 0 1px 4px var(--r-shadow);
      opacity: .45;
    }
    .bp.valid {
      cursor: pointer;
      opacity: 1;
      transform: scale(1.15);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,.5),
        0 0 0 2px var(--c-mid),
        0 2px 10px var(--c-shadow);
    }
    .bp.valid:hover { transform: scale(1.25); }

    /* ── Status bar ────────────────────────────────────── */
    .statusbar {
      padding: .8rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: .5rem;
      min-height: 3.2rem;
    }
    #status  { font-size: .9rem; color: var(--text); }
    #dice    { font-size: 1rem; color: var(--gold); letter-spacing: .2em; white-space: nowrap; }
    #action  { grid-column: 1/-1; font-size: .72rem; color: var(--muted); margin-top: .1rem; }

    /* ── Connection dot ────────────────────────────────── */
    .dot-conn {
      position: fixed; top: .7rem; right: .8rem;
      font-size: .65rem; padding: .15rem .4rem;
      border-radius: 3px; border: 1px solid;
    }
    .dot-conn.ok  { color: #080; border-color: #080; background: rgba(0,100,0,.08); }
    .dot-conn.err { color: #c00; border-color: #c00; background: rgba(160,0,0,.07); }

    /* ── Game-over overlay ─────────────────────────────── */
    #gameover {
      display: none; position: fixed; inset: 0;
      background: rgba(240,235,228,.95);
      flex-direction: column; align-items: center; justify-content: center;
      gap: .75rem;
    }
    #gameover.show { display: flex; }
    #go-text {
      font-size: clamp(2.5rem, 9vw, 4.5rem);
      letter-spacing: .35em;
      font-weight: bold;
    }
    .win-text  { color: var(--gold); }
    .lose-text { color: var(--muted); }
    #gameover small { color: var(--dim); font-size: .8rem; letter-spacing: .12em; }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 540px) {
      body { padding: .75rem 0; gap: .75rem; justify-content: flex-start; }

      .wrap { width: 100vw; box-shadow: none; }

      .title { font-size: .7rem; letter-spacing: .3em; }

      .scorebar { padding: .55rem .85rem; }
      .player .btxt { display: none; }  /* shown in bench strip instead */
      .player { gap: .4rem; font-size: .85rem; }
      .player .pts { font-size: .9rem; }
      .dot-sm { width: 12px; height: 12px; }

      .board { gap: 3px; padding: 7px; }
      .cell { border-radius: 4px; }

      .bench-strip { padding: .45rem .85rem; min-height: 3rem; }
      .bench-side { gap: 6px; }
      .bp { width: 22px; height: 22px; }

      .statusbar {
        padding: .65rem .85rem;
        grid-template-columns: 1fr;
        min-height: auto;
      }
      #status { font-size: .88rem; }
      #dice   { font-size: .88rem; }
      #action { font-size: .7rem; }
    }

    /* ── Tight landscape (phone rotated) ───────────────── */
    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: .3rem 0; gap: .3rem; justify-content: center; }
      .title { display: none; }
      .scorebar { padding: .3rem .85rem; }
      .bench-strip { padding: .25rem .85rem; min-height: 2rem; }
      .bp { width: 14px; height: 14px; }
      .statusbar { padding: .35rem .85rem; min-height: 2rem; }
      #status, #dice, #action { font-size: .75rem; }
    }
  </style>
</head>
<body>

  <div class="dot-conn err" id="dot">⬤ connecting</div>

  <p class="title">The Royal Game of Ur</p>

  <div class="wrap">
    <div class="scorebar">
      <div class="player you">
        <div class="dot-sm cyan"></div>
        <span class="label">YOU</span>
        <span class="pts" id="you-score">0 pts</span>
        <span class="btxt" id="you-btxt"></span>
      </div>
      <span class="vs">— vs —</span>
      <div class="player opp" style="flex-direction:row-reverse">
        <div class="dot-sm red"></div>
        <span class="label">OPP</span>
        <span class="pts" id="opp-score">0 pts</span>
        <span class="btxt" id="opp-btxt"></span>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="bench-strip">
      <div class="bench-side" id="you-bench">
        <span class="bench-lbl">bench</span>
      </div>
      <div class="bench-side" id="opp-bench" style="flex-direction:row-reverse">
        <span class="bench-lbl">bench</span>
      </div>
    </div>

    <div class="statusbar">
      <div id="status">Connecting…</div>
      <div id="dice"></div>
      <div id="action"></div>
    </div>
  </div>

  <div id="gameover">
    <div id="go-text"></div>
    <small>refresh to play again</small>
  </div>

  <script>
    const P1_PATH = {1:[2,3],2:[2,2],3:[2,1],4:[2,0],5:[1,0],6:[1,1],7:[1,2],8:[1,3],9:[1,4],10:[1,5],11:[1,6],12:[1,7],13:[2,7],14:[2,6]};
    const P2_PATH = {1:[0,3],2:[0,2],3:[0,1],4:[0,0],5:[1,0],6:[1,1],7:[1,2],8:[1,3],9:[1,4],10:[1,5],11:[1,6],12:[1,7],13:[0,7],14:[0,6]};
    const ROSETTAS = new Set(['0,0','2,0','1,3','0,6','2,6']);
    const MISSING  = new Set(['0,4','0,5','2,4','2,5']);

    let pendingMoves = [];
    let p2State = {};

    // build board
    const boardEl = document.getElementById('board');
    for (let r = 2; r >= 0; r--) {
      for (let c = 0; c < 8; c++) {
        const k = `${r},${c}`;
        const d = document.createElement('div');
        d.id = `c${r}${c}`;
        d.className = MISSING.has(k) ? 'cell missing'
                    : ROSETTAS.has(k) ? 'cell rosetta'
                    : 'cell';
        boardEl.appendChild(d);
      }
    }

    function render(board) {
      document.querySelectorAll('.cell:not(.missing)').forEach(c => {
        c.querySelectorAll('.piece').forEach(p => p.remove());
        c.classList.remove('valid');
        c.onclick = null;
      });

      p2State = {};
      for (const [k, v] of Object.entries(board.p2_pieces)) p2State[+k] = v;

      for (const [, prog] of Object.entries(board.p1_pieces)) {
        const coord = P1_PATH[+prog];
        if (!coord) continue;
        place(`c${coord[0]}${coord[1]}`, 'p1', ROSETTAS.has(`${coord[0]},${coord[1]}`));
      }
      for (const [k, prog] of Object.entries(board.p2_pieces)) {
        const coord = P2_PATH[+prog];
        if (!coord) continue;
        place(`c${coord[0]}${coord[1]}`, 'p2', ROSETTAS.has(`${coord[0]},${coord[1]}`), +k);
      }

      if (board.stats) {
        const s = board.stats;
        document.getElementById('you-score').textContent = `${s.p2_score} pts`;
        document.getElementById('opp-score').textContent = `${s.p1_score} pts`;
        document.getElementById('you-btxt').textContent = s.p2_waiting ? `· ${s.p2_waiting} waiting` : '';
        document.getElementById('opp-btxt').textContent = s.p1_waiting ? `· ${s.p1_waiting} waiting` : '';
      }

      const youBench = Object.entries(board.p2_pieces).filter(([,p]) => p === 0).map(() => 'p2c');
      const oppBench = Object.entries(board.p1_pieces).filter(([,p]) => p === 0).map(() => 'p1c');
      renderBench('you-bench', youBench);
      renderBench('opp-bench', oppBench);
    }

    function place(id, player, onRosetta, pid) {
      const cell = document.getElementById(id);
      if (!cell) return;
      const s = document.createElement('div');
      s.className = `piece ${player}${onRosetta ? ' lit' : ''}`;
      if (pid !== undefined) s.dataset.pid = pid;
      cell.appendChild(s);
    }

    function renderBench(id, classes) {
      const el = document.getElementById(id);
      el.querySelectorAll('.bp').forEach(p => p.remove());
      const lbl = el.querySelector('.bench-lbl');
      for (const cls of classes) {
        const s = document.createElement('div');
        s.className = `bp ${cls}`;
        el.insertBefore(s, lbl.nextSibling);
      }
    }

    function highlight(ids) {
      pendingMoves = ids;
      let benchId = null;
      for (const id of ids) {
        const prog = p2State[id];
        if (prog === 0) { if (benchId === null) benchId = id; continue; }
        const coord = P2_PATH[prog];
        if (!coord) continue;
        const cell = document.getElementById(`c${coord[0]}${coord[1]}`);
        if (!cell) continue;
        cell.classList.add('valid');
        cell.onclick = () => pick(id);
      }
      if (benchId !== null) {
        const bid = benchId;
        document.querySelectorAll('#you-bench .bp').forEach(el => {
          el.classList.add('valid');
          el.onclick = () => pick(bid);
        });
      }
    }

    function clearHighlight() {
      pendingMoves = [];
      document.querySelectorAll('.cell.valid').forEach(c => { c.classList.remove('valid'); c.onclick = null; });
      document.querySelectorAll('.bp.valid').forEach(p => { p.classList.remove('valid'); p.onclick = null; });
    }

    function pick(pieceId) {
      clearHighlight();
      setText('Moving…');
      fetch('/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'move', piece_id: pieceId })
      }).catch(() => setText('Send failed.'));
    }

    function setText(t) { document.getElementById('status').textContent = t; }
    function setDice(n) {
      document.getElementById('dice').textContent = n != null
        ? '●'.repeat(n) + '○'.repeat(4 - n) : '';
    }
    function setAction(a) {
      if (!a) { document.getElementById('action').textContent = ''; return; }
      const who = a.player_idx === 0 ? 'Opponent' : 'You';
      let m;
      if      (a.action_type === 'scored')   m = `${who} scored ✦`;
      else if (a.action_type === 'no_moves') m = `${who} had no valid moves`;
      else if (a.hit)                        m = `${who} captured a piece`;
      else if (a.rosetta)                    m = `${who} landed on ✿  — extra turn`;
      else                                   m = `${who} moved  ·  rolled ${a.roll}`;
      document.getElementById('action').textContent = m;
    }

    function handle(msg) {
      clearHighlight();
      setAction(msg.last_action);
      switch (msg.type) {
        case 'new_game':
          setText('Waiting for host…'); setDice(null); break;
        case 'restore':
          render(msg.board); setText('Resumed.'); break;
        case 'rolling':
          render(msg.board); setDice(msg.roll);
          setText(`Opponent rolled ${msg.roll}  ·  thinking…`); break;
        case 'state':
          render(msg.board); setDice(null);
          setText('Waiting for opponent…'); break;
        case 'no_moves':
          render(msg.board); setDice(null); break;
        case 'your_turn':
          render(msg.board); setDice(msg.roll);
          setText(`Your turn  ·  rolled ${msg.roll}  ·  pick a piece`);
          highlight(msg.valid_moves); break;
        case 'game_over': {
          render(msg.board);
          const won = msg.winner_idx === 1;
          const tx = document.getElementById('go-text');
          tx.textContent = won ? 'VICTORY' : 'DEFEAT';
          tx.className = won ? 'win-text' : 'lose-text';
          document.getElementById('gameover').classList.add('show');
          break;
        }
      }
    }

    const dotEl = document.getElementById('dot');
    const es = new EventSource('/events');
    es.onopen    = () => { dotEl.className = 'dot-conn ok';  dotEl.textContent = '⬤ connected'; };
    es.onerror   = () => { dotEl.className = 'dot-conn err'; dotEl.textContent = '⬤ reconnecting…'; };
    es.onmessage = e  => handle(JSON.parse(e.data));
  </script>
</body>
</html>
