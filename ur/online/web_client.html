<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f0ece4">
  <title>The Royal Game of Ur</title>
  <style>
    :root {
      --bg:       #f0ece4;
      --surface:  #ffffff;
      --cell:     #e8e4dc;
      --cell-r:   #fdf6e3;
      --gap:      #ccc8c0;
      --border:   #d4d0c8;
      --gold:     #c09800;
      --gold-bd:  #d4b040;
      --text:     #1a1a1a;
      --muted:    #777;
      --dim:      #bbb;

      /* You / opponent piece colours — overridden dynamically at match start */
      --c-top:        #88f4f4;
      --c-mid:        #00b8b8;
      --c-bot:        #006e6e;
      --c-shadow:     rgba(0,140,140,.4);
      --c-lit-top:    #a8ffff;
      --c-lit-mid:    #10cccc;
      --c-lit-bot:    #008888;
      --c-lit-shadow: rgba(0,160,160,.5);

      --r-top:        #ff9090;
      --r-mid:        #d42020;
      --r-bot:        #8a0f0f;
      --r-shadow:     rgba(160,10,10,.45);
      --r-lit-top:    #ffb0b0;
      --r-lit-mid:    #f03030;
      --r-lit-bot:    #aa1010;
      --r-lit-shadow: rgba(200,20,20,.55);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      padding: 1.5rem 1rem;
      overscroll-behavior-y: none;
      padding-left:  max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      padding-bottom: env(safe-area-inset-bottom);
    }

    .title {
      font-size: clamp(1rem, 2.8vw, 2rem);
      letter-spacing: .55em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .wrap {
      width: min(96vw, 900px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 32px rgba(0,0,0,.12);
    }

    /* ── Connection dot ─────────────────────────────────── */
    .dot-conn {
      position: fixed; top: .7rem; right: .8rem;
      font-size: .65rem; padding: .15rem .4rem;
      border-radius: 3px; border: 1px solid;
    }
    .dot-conn.ok  { color: #080; border-color: #080; background: rgba(0,100,0,.08); }
    .dot-conn.err { color: #c00; border-color: #c00; background: rgba(160,0,0,.07); }


    /* ════════════════════════════════════════════════════
       LOBBY
    ════════════════════════════════════════════════════ */

    #lobby-view { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; width: 100%; }

    .lobby-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.1rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .lobby-panel-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .field-lbl {
      font-size: .75rem;
      letter-spacing: .12em;
      color: var(--muted);
      width: 3.5rem;
      flex-shrink: 0;
    }
    #player-name {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      padding: .35rem .65rem;
      outline: none;
    }
    #player-name:focus { border-color: var(--gold); }

    .swatches { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
    .swatch {
      width: 26px; height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .12s, border-color .12s;
      flex-shrink: 0;
    }
    .swatch.sel {
      border-color: var(--text);
      transform: scale(1.18);
    }

    #create-btn {
      font-family: inherit;
      font-size: .88rem;
      letter-spacing: .1em;
      padding: .6rem 1.4rem;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      align-self: flex-start;
    }
    #create-btn:hover { opacity: .82; }
    #create-btn:disabled { opacity: .35; cursor: default; }

    /* Games section */
    .games-hdr {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .55rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--muted);
    }
    #games-count { color: var(--dim); }

    #games-list { display: flex; flex-direction: column; }

    .game-row {
      display: flex;
      align-items: center;
      padding: .65rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      gap: .8rem;
    }
    .game-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .game-host { font-size: .9rem; flex: 1; }
    .game-name-txt { font-size: .72rem; color: var(--muted); }
    .join-btn {
      font-family: inherit;
      font-size: .75rem;
      letter-spacing: .06em;
      padding: .3rem .8rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
    }
    .join-btn:hover { background: var(--cell); }
    .join-btn:disabled { opacity: .35; cursor: default; }

    #no-games {
      padding: .85rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      font-size: .8rem;
      color: var(--dim);
      font-style: italic;
    }

    .lobby-status-bar {
      padding: .6rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      font-size: .82rem;
      color: var(--muted);
      min-height: 2.4rem;
    }


    /* ════════════════════════════════════════════════════
       GAME
    ════════════════════════════════════════════════════ */

    #game-view { display: none; flex-direction: column; align-items: center; gap: 1.4rem; width: 100%; }

    /* ── Game status — standalone strip outside the board wrap ── */
    #game-status {
      width: min(96vw, 900px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .18rem;
      padding: .5rem 1.2rem;
    }
    #status { font-size: .95rem; color: var(--text); text-align: center; }
    #action { font-size: .78rem; color: var(--muted); text-align: center; min-height: 1.1em; }

    /* ── Player strips — above/below the board ────────────────── */
    .player-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .7rem 1.2rem;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      gap: 1rem;
      min-height: 3.2rem;
    }
    .opp-strip { border-top: 1px solid var(--border); }
    .you-strip { border-bottom: 1px solid var(--border); }

    /* Info cluster (dot + name + pts + waiting) */
    .pinfo { display: flex; align-items: center; gap: .55rem; }
    .pname { font-size: .88rem; }
    .ppts  { font-size: .9rem; font-weight: bold; }
    .pbtxt { font-size: .72rem; color: var(--dim); }
    .you-strip .ppts { color: var(--c-mid); }
    .opp-strip .ppts { color: var(--r-mid); }

    /* Coloured dot */
    .dot-sm {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-sm.you-dot {
      background: radial-gradient(circle at 38% 32%, var(--c-top), var(--c-mid) 60%, var(--c-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.5), 0 1px 4px var(--c-shadow);
    }
    .dot-sm.opp-dot {
      background: radial-gradient(circle at 38% 32%, var(--r-top), var(--r-mid) 60%, var(--r-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.4), 0 1px 4px var(--r-shadow);
    }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
      padding: 12px;
      background: var(--gap);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .board.flipped { transform: scaleY(-1); }
    .board.flipped .cell { transform: scaleY(-1); }

    .cell {
      aspect-ratio: 1;
      background: var(--cell);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      user-select: none;
      touch-action: manipulation;
      transition: background .12s, box-shadow .12s;
    }
    .cell.rosetta {
      background: var(--cell-r);
      box-shadow: inset 0 0 0 1.5px var(--gold-bd);
    }
    .cell.rosetta::before {
      content: '✿';
      position: absolute;
      font-size: .6em; color: var(--gold); opacity: .35;
      font-weight: normal; pointer-events: none;
    }
    .cell.missing { background: transparent; box-shadow: none; pointer-events: none; }
    .cell.valid {
      cursor: pointer;
      background: color-mix(in srgb, var(--c-mid) 15%, var(--cell));
      box-shadow: inset 0 0 0 2px var(--c-mid);
    }
    .cell.valid:hover { background: color-mix(in srgb, var(--c-mid) 26%, var(--cell)); }

    /* Pieces */
    .piece {
      width: 68%; aspect-ratio: 1; border-radius: 50%;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    .piece.p2 {
      background: radial-gradient(circle at 38% 30%, var(--c-top), var(--c-mid) 55%, var(--c-bot));
      box-shadow: inset 0 3px 6px rgba(255,255,255,.55), inset 0 -3px 5px rgba(0,0,0,.2), 0 4px 10px var(--c-shadow);
    }
    .piece.p1 {
      background: radial-gradient(circle at 38% 30%, var(--r-top), var(--r-mid) 55%, var(--r-bot));
      box-shadow: inset 0 3px 6px rgba(255,255,255,.45), inset 0 -3px 5px rgba(0,0,0,.3), 0 4px 10px var(--r-shadow);
    }
    .piece.p2.lit {
      background: radial-gradient(circle at 38% 30%, var(--c-lit-top), var(--c-lit-mid) 50%, var(--c-lit-bot));
      box-shadow: inset 0 3px 8px rgba(255,255,255,.7), inset 0 -3px 5px rgba(0,0,0,.15),
                  0 5px 16px var(--c-lit-shadow), 0 0 22px var(--c-shadow);
    }
    .piece.p1.lit {
      background: radial-gradient(circle at 38% 30%, var(--r-lit-top), var(--r-lit-mid) 50%, var(--r-lit-bot));
      box-shadow: inset 0 3px 8px rgba(255,255,255,.6), inset 0 -3px 5px rgba(0,0,0,.25),
                  0 5px 16px var(--r-lit-shadow), 0 0 22px var(--r-shadow);
    }

    /* Bench — lives inside player strips */
    .pbench { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .bench-lbl { color: var(--dim); font-size: .7rem; }
    .bp {
      width: 16px; height: 16px; border-radius: 50%;
      cursor: default; touch-action: manipulation;
      transition: transform .1s, box-shadow .1s; flex-shrink: 0;
    }
    .bp.myc {
      background: radial-gradient(circle at 38% 32%, var(--c-top), var(--c-mid) 60%, var(--c-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.5), 0 1px 4px var(--c-shadow);
    }
    .bp.oppc {
      background: radial-gradient(circle at 38% 32%, var(--r-top), var(--r-mid) 60%, var(--r-bot));
      box-shadow: inset 0 1px 3px rgba(255,255,255,.4), 0 1px 4px var(--r-shadow);
      opacity: .45;
    }
    .bp.valid {
      cursor: pointer; opacity: 1; transform: scale(1.15);
      box-shadow: inset 0 1px 3px rgba(255,255,255,.5), 0 0 0 2px var(--c-mid), 0 2px 10px var(--c-shadow);
    }
    .bp.valid:hover { transform: scale(1.25); }

    /* Dice row — sits between title and board wrap */
    .dice-row {
      display: flex;
      gap: clamp(.6rem, 1.6vw, 1.2rem);
      align-items: center;
      justify-content: center;
      padding: .5rem 0;
      min-height: 5rem;
    }
    .die {
      width: clamp(44px, 6.5vw, 72px);
      height: clamp(44px, 6.5vw, 72px);
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .15s;
    }
    .die.filled {
      background: radial-gradient(circle at 38% 30%,
        #ffe066, var(--gold) 55%, #8a6200);
      box-shadow:
        inset 0 4px 10px rgba(255,255,255,.55),
        inset 0 -4px 8px rgba(0,0,0,.3),
        0 6px 18px rgba(160,120,0,.5);
    }
    .die.empty {
      background: var(--cell);
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,.12),
        inset 0 -2px 4px rgba(255,255,255,.6),
        0 2px 6px rgba(0,0,0,.08);
    }


    /* Game-over overlay */
    #gameover {
      display: none; position: fixed; inset: 0;
      background: rgba(240,235,228,.95);
      flex-direction: column; align-items: center; justify-content: center; gap: .75rem;
    }
    #gameover.show { display: flex; }
    #go-text { font-size: clamp(2.5rem, 9vw, 4.5rem); letter-spacing: .35em; font-weight: bold; }
    .win-text  { color: var(--gold); }
    .lose-text { color: var(--muted); }
    #gameover small { color: var(--dim); font-size: .8rem; letter-spacing: .12em; }

    /* Mobile */
    @media (max-width: 540px) {
      body { padding: .75rem 0; gap: .5rem; justify-content: flex-start; }
      .wrap { width: 100vw; box-shadow: none; }
      .title { font-size: .8rem; letter-spacing: .3em; }
      .dice-row { gap: .5rem; min-height: 3.2rem; padding: .25rem 0; }
      .die { width: 38px; height: 38px; }
      .lobby-panel { padding: .85rem 1rem; }
      .lobby-panel-row { flex-wrap: wrap; gap: .6rem; }
      .field-lbl { width: 2.8rem; }
      .games-hdr, .game-row, #no-games, .lobby-status-bar { padding-left: 1rem; padding-right: 1rem; }
      #game-status { padding: .3rem .85rem; }
      .player-strip { padding: .5rem .85rem; min-height: 2.6rem; }
      .pbtxt { display: none; }
      .board { gap: 3px; padding: 7px; }
      .bp { width: 20px; height: 20px; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      body { padding: .3rem 0; gap: .3rem; justify-content: center; }
      .title { display: none; }
      .dice-row { min-height: 2.5rem; padding: .1rem 0; }
      .die { width: 30px; height: 30px; }
      #game-status { padding: .15rem .85rem; }
      .player-strip { padding: .3rem .85rem; min-height: 2rem; }
    }
  </style>
</head>
<body>

  <div class="dot-conn err" id="dot">⬤ connecting</div>

  <!-- ── LOBBY ───────────────────────────────────────── -->
  <div id="lobby-view">
    <p class="title">The Royal Game of Ur</p>

    <div class="wrap">
      <!-- Identity setup -->
      <div class="lobby-panel">
        <div class="lobby-panel-row">
          <span class="field-lbl">Name</span>
          <input id="player-name" type="text" placeholder="Your name" maxlength="20" value="Player">
        </div>
        <div class="lobby-panel-row">
          <span class="field-lbl">Color</span>
          <div id="swatches" class="swatches"></div>
        </div>
      </div>

      <div class="lobby-panel" style="flex-direction:row; align-items:center; justify-content:space-between; border-top:none;">
        <button id="create-btn">+ Create Game</button>
        <span style="font-size:.75rem; color:var(--dim);" id="lobby-hint">or join one below</span>
      </div>

      <!-- Games list -->
      <div class="games-hdr">
        <span>Open Games</span>
        <span id="games-count">0 games</span>
      </div>
      <div id="games-list"></div>
      <div id="no-games">No open games — be the first to create one</div>

      <div class="lobby-status-bar">
        <div id="lobby-status"></div>
      </div>
    </div>
  </div>

  <!-- ── GAME ────────────────────────────────────────── -->
  <div id="game-view">
    <p class="title">The Royal Game of Ur</p>

    <div class="dice-row" id="dice-row"></div>

    <!-- Status/action — between dice and board, outside the board frame -->
    <div id="game-status">
      <div id="status">Connecting…</div>
      <div id="action"></div>
    </div>

    <div class="wrap">
      <!-- Opponent info — above the board -->
      <div class="player-strip opp-strip">
        <div class="pinfo">
          <div class="dot-sm opp-dot"></div>
          <span class="pname" id="opp-label">OPP</span>
          <span class="ppts" id="opp-score">0 pts</span>
          <span class="pbtxt" id="opp-btxt"></span>
        </div>
        <div class="pbench" id="opp-bench">
          <span class="bench-lbl">bench</span>
        </div>
      </div>

      <div class="board" id="board"></div>

      <!-- Player info — below the board -->
      <div class="player-strip you-strip">
        <div class="pbench" id="you-bench">
          <span class="bench-lbl">bench</span>
        </div>
        <div class="pinfo">
          <div class="dot-sm you-dot"></div>
          <span class="pname" id="you-label">YOU</span>
          <span class="ppts" id="you-score">0 pts</span>
          <span class="pbtxt" id="you-btxt"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="gameover">
    <div id="go-text"></div>
    <small>refresh to play again</small>
  </div>

  <script>
    /* ── Board paths & constants ─────────────────────── */
    const P1_PATH = {1:[2,3],2:[2,2],3:[2,1],4:[2,0],5:[1,0],6:[1,1],7:[1,2],8:[1,3],9:[1,4],10:[1,5],11:[1,6],12:[1,7],13:[2,7],14:[2,6]};
    const P2_PATH = {1:[0,3],2:[0,2],3:[0,1],4:[0,0],5:[1,0],6:[1,1],7:[1,2],8:[1,3],9:[1,4],10:[1,5],11:[1,6],12:[1,7],13:[0,7],14:[0,6]};
    const ROSETTAS = new Set(['0,0','2,0','1,3','0,6','2,6']);
    const MISSING  = new Set(['0,4','0,5','2,4','2,5']);

    const SWATCHES = [
      '#d42020', // red
      '#2060d4', // blue
      '#20a040', // green
      '#8020c8', // purple
      '#d47020', // orange
      '#d420a0', // pink
      '#00b8b8', // teal
      '#c09800', // gold
    ];

    /* ── Colour helpers ──────────────────────────────── */
    function hexVariants(hex) {
      const r = parseInt(hex.slice(1,3), 16) / 255;
      const g = parseInt(hex.slice(3,5), 16) / 255;
      const b = parseInt(hex.slice(5,7), 16) / 255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      let h = 0, s = 0;
      const l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if      (max === r) h = (g - b) / d + (g < b ? 6 : 0);
        else if (max === g) h = (b - r) / d + 2;
        else                h = (r - g) / d + 4;
        h /= 6;
      }
      const hd = Math.round(h * 360);
      const sp = Math.round(s * 100);
      const lp = Math.round(l * 100);
      return {
        top:        `hsl(${hd},${Math.min(sp+15,100)}%,${Math.min(lp+30,92)}%)`,
        mid:        hex,
        bot:        `hsl(${hd},${Math.min(sp+20,100)}%,${Math.max(lp-28,8)}%)`,
        shadow:     `hsla(${hd},${sp}%,${Math.max(lp-10,10)}%,.42)`,
        litTop:     `hsl(${hd},${Math.min(sp+15,100)}%,${Math.min(lp+38,96)}%)`,
        litMid:     `hsl(${hd},${Math.min(sp+10,100)}%,${Math.min(lp+12,82)}%)`,
        litBot:     `hsl(${hd},${Math.min(sp+20,100)}%,${Math.max(lp-22,10)}%)`,
        litShadow:  `hsla(${hd},${sp}%,${Math.max(lp-5,15)}%,.55)`,
      };
    }

    function applyColors(youHex, oppHex) {
      const y = hexVariants(youHex), o = hexVariants(oppHex);
      const s = document.documentElement.style;
      s.setProperty('--c-top', y.top);
      s.setProperty('--c-mid', y.mid);
      s.setProperty('--c-bot', y.bot);
      s.setProperty('--c-shadow', y.shadow);
      s.setProperty('--c-lit-top', y.litTop);
      s.setProperty('--c-lit-mid', y.litMid);
      s.setProperty('--c-lit-bot', y.litBot);
      s.setProperty('--c-lit-shadow', y.litShadow);
      s.setProperty('--r-top', o.top);
      s.setProperty('--r-mid', o.mid);
      s.setProperty('--r-bot', o.bot);
      s.setProperty('--r-shadow', o.shadow);
      s.setProperty('--r-lit-top', o.litTop);
      s.setProperty('--r-lit-mid', o.litMid);
      s.setProperty('--r-lit-bot', o.litBot);
      s.setProperty('--r-lit-shadow', o.litShadow);
    }

    function swatchGradient(hex) {
      const v = hexVariants(hex);
      return `radial-gradient(circle at 38% 32%, ${v.top}, ${v.mid} 60%, ${v.bot})`;
    }

    /* ── Lobby setup ─────────────────────────────────── */
    let selectedSwatch = 0;

    const swatchesEl = document.getElementById('swatches');
    SWATCHES.forEach((hex, i) => {
      const d = document.createElement('div');
      d.className = 'swatch' + (i === 0 ? ' sel' : '');
      d.style.background = swatchGradient(hex);
      const v = hexVariants(hex);
      d.style.boxShadow = `inset 0 1px 3px rgba(255,255,255,.5), 0 1px 5px ${v.shadow}`;
      d.onclick = () => {
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
        d.classList.add('sel');
        selectedSwatch = i;
      };
      swatchesEl.appendChild(d);
    });

    function myColor()  { return SWATCHES[selectedSwatch]; }
    function myName()   { return document.getElementById('player-name').value.trim() || 'Player'; }

    document.getElementById('create-btn').addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      setLobbyStatus('Creating game…');
      disableLobby(true);
      ws.send(JSON.stringify({ type: 'create', name: myName(), color: myColor() }));
    });

    function disableLobby(on) {
      document.getElementById('create-btn').disabled = on;
      document.querySelectorAll('.join-btn').forEach(b => b.disabled = on);
    }

    function setLobbyStatus(msg) {
      document.getElementById('lobby-status').textContent = msg;
    }

    function renderGames(games) {
      const list = document.getElementById('games-list');
      const none = document.getElementById('no-games');
      const cnt  = document.getElementById('games-count');
      list.innerHTML = '';
      cnt.textContent = games.length + (games.length === 1 ? ' game' : ' games');
      none.style.display = games.length ? 'none' : '';

      games.forEach(g => {
        const row = document.createElement('div');
        row.className = 'game-row';

        const dot = document.createElement('div');
        dot.className = 'game-dot';
        dot.style.background = swatchGradient(g.host_color);
        const v = hexVariants(g.host_color);
        dot.style.boxShadow = `inset 0 1px 3px rgba(255,255,255,.5), 0 1px 4px ${v.shadow}`;

        const info = document.createElement('div');
        info.style.flex = '1';
        info.innerHTML = `<span class="game-host">${escHtml(g.host_name)}</span>
          <span class="game-name-txt">  ·  ${escHtml(g.game_name)}</span>`;

        const btn = document.createElement('button');
        btn.className = 'join-btn';
        btn.textContent = 'Join';
        btn.onclick = () => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          setLobbyStatus(`Joining ${g.host_name}'s game…`);
          disableLobby(true);
          ws.send(JSON.stringify({ type: 'join', game_id: g.game_id, name: myName(), color: myColor() }));
        };

        row.appendChild(dot);
        row.appendChild(info);
        row.appendChild(btn);
        list.appendChild(row);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── Game state ──────────────────────────────────── */
    let myIdx = -1;
    let myPath = P2_PATH, oppPath = P1_PATH;
    let myKey = 'p2_pieces', oppKey = 'p1_pieces';
    let myPClass = 'p2', oppPClass = 'p1';
    let myScoreKey = 'p2_score', myWaitKey = 'p2_waiting';
    let oppScoreKey = 'p1_score', oppWaitKey = 'p1_waiting';
    let myPiecesState = {};
    let myPlayerName = 'You', oppPlayerName = 'Opponent';

    const boardEl = document.getElementById('board');
    for (let r = 2; r >= 0; r--) {
      for (let c = 0; c < 8; c++) {
        const k = `${r},${c}`;
        const d = document.createElement('div');
        d.id = `c${r}${c}`;
        d.className = MISSING.has(k) ? 'cell missing' : ROSETTAS.has(k) ? 'cell rosetta' : 'cell';
        boardEl.appendChild(d);
      }
    }

    function setupGame(msg) {
      myIdx = msg.player_idx;
      myPlayerName = msg.you.name;
      oppPlayerName = msg.opponent.name;

      applyColors(msg.you.color, msg.opponent.color);

      if (myIdx === 0) {
        boardEl.classList.add('flipped');
        myPath = P1_PATH; oppPath = P2_PATH;
        myKey = 'p1_pieces'; oppKey = 'p2_pieces';
        // myPClass / oppPClass stay p2/p1 — p2 always uses --c-* (your color),
        // p1 always uses --r-* (opponent color), regardless of player index
        myScoreKey = 'p1_score'; myWaitKey = 'p1_waiting';
        oppScoreKey = 'p2_score'; oppWaitKey = 'p2_waiting';
      }

      document.getElementById('you-label').textContent = myPlayerName.toUpperCase().slice(0,6);
      document.getElementById('opp-label').textContent = oppPlayerName.toUpperCase().slice(0,6);

      // Switch to game view
      document.getElementById('lobby-view').style.display = 'none';
      const gv = document.getElementById('game-view');
      gv.style.display = 'flex';
      gv.style.flexDirection = 'column';
      gv.style.alignItems = 'center';
    }

    function render(board) {
      document.querySelectorAll('.cell:not(.missing)').forEach(c => {
        c.querySelectorAll('.piece').forEach(p => p.remove());
        c.classList.remove('valid');
        c.onclick = null;
      });

      myPiecesState = {};
      for (const [k, v] of Object.entries(board[myKey])) myPiecesState[+k] = v;

      for (const [, prog] of Object.entries(board[oppKey])) {
        const coord = oppPath[+prog];
        if (!coord) continue;
        place(`c${coord[0]}${coord[1]}`, oppPClass, ROSETTAS.has(`${coord[0]},${coord[1]}`));
      }
      for (const [k, prog] of Object.entries(board[myKey])) {
        const coord = myPath[+prog];
        if (!coord) continue;
        place(`c${coord[0]}${coord[1]}`, myPClass, ROSETTAS.has(`${coord[0]},${coord[1]}`), +k);
      }

      if (board.stats) {
        const s = board.stats;
        document.getElementById('you-score').textContent = `${s[myScoreKey]} pts`;
        document.getElementById('opp-score').textContent = `${s[oppScoreKey]} pts`;
        document.getElementById('you-btxt').textContent = s[myWaitKey]  ? `· ${s[myWaitKey]} waiting`  : '';
        document.getElementById('opp-btxt').textContent = s[oppWaitKey] ? `· ${s[oppWaitKey]} waiting` : '';
      }

      const youBench = Object.entries(board[myKey]).filter(([,p]) => p === 0).map(() => 'myc');
      const oppBench = Object.entries(board[oppKey]).filter(([,p]) => p === 0).map(() => 'oppc');
      renderBench('you-bench', youBench);
      renderBench('opp-bench', oppBench);
    }

    function place(id, pclass, onRosetta, pid) {
      const cell = document.getElementById(id);
      if (!cell) return;
      const s = document.createElement('div');
      s.className = `piece ${pclass}${onRosetta ? ' lit' : ''}`;
      if (pid !== undefined) s.dataset.pid = pid;
      cell.appendChild(s);
    }

    function renderBench(id, classes) {
      const el = document.getElementById(id);
      el.querySelectorAll('.bp').forEach(p => p.remove());
      const lbl = el.querySelector('.bench-lbl');
      for (const cls of classes) {
        const s = document.createElement('div');
        s.className = `bp ${cls}`;
        el.insertBefore(s, lbl.nextSibling);
      }
    }

    function highlight(ids) {
      let benchId = null;
      for (const id of ids) {
        const prog = myPiecesState[id];
        if (prog === 0) { if (benchId === null) benchId = id; continue; }
        const coord = myPath[prog];
        if (!coord) continue;
        const cell = document.getElementById(`c${coord[0]}${coord[1]}`);
        if (!cell) continue;
        cell.classList.add('valid');
        cell.onclick = () => pick(id);
      }
      if (benchId !== null) {
        const bid = benchId;
        document.querySelectorAll('#you-bench .bp').forEach(el => {
          el.classList.add('valid');
          el.onclick = () => pick(bid);
        });
      }
    }

    function clearHighlight() {
      document.querySelectorAll('.cell.valid').forEach(c => { c.classList.remove('valid'); c.onclick = null; });
      document.querySelectorAll('.bp.valid').forEach(p => { p.classList.remove('valid'); p.onclick = null; });
    }

    function pick(pieceId) {
      clearHighlight();
      setText('Moving…');
      ws.send(JSON.stringify({ type: 'move', piece_id: pieceId }));
    }

    function setText(t) { document.getElementById('status').textContent = t; }
    function setDice(n) {
      const row = document.getElementById('dice-row');
      row.innerHTML = '';
      if (n == null) return;
      for (let i = 0; i < 4; i++) {
        const d = document.createElement('div');
        d.className = 'die ' + (i < n ? 'filled' : 'empty');
        row.appendChild(d);
      }
    }
    function setAction(a) {
      if (!a) { document.getElementById('action').textContent = ''; return; }
      const who = a.player_idx === myIdx ? myPlayerName : oppPlayerName;
      let m;
      if      (a.action_type === 'scored')  m = `${who} scored ✦`;
      else if (a.action_type === 'skipped') m = `${who} had no valid moves`;
      else if (a.hit)                       m = `${who} captured a piece`;
      else if (a.rosetta)                   m = `${who} landed on ✿  — extra turn`;
      else                                  m = `${who} moved  ·  rolled ${a.roll}`;
      document.getElementById('action').textContent = m;
    }

    /* ── Message handler ─────────────────────────────── */
    function handle(msg) {
      switch (msg.type) {

        // Lobby messages
        case 'lobby':
          setLobbyStatus('Connected. Choose a name and color.');
          document.getElementById('dot').className = 'dot-conn ok';
          document.getElementById('dot').textContent = '⬤ connected';
          break;

        case 'games':
          renderGames(msg.games);
          break;

        case 'waiting':
          setLobbyStatus(`Waiting for an opponent to join "${msg.game_name}"…`);
          break;

        case 'error':
          setLobbyStatus(msg.msg || 'Error');
          disableLobby(false);
          break;

        // Game messages
        case 'matched':
          setupGame(msg);
          setText(`Game on!  ·  you are ${msg.you.name}`);
          break;

        case 'rolling':
          clearHighlight();
          setAction(msg.last_action);
          render(msg.board); setDice(msg.roll);
          setText(`${oppPlayerName} rolled ${msg.roll}  ·  thinking…`);
          break;

        case 'state':
          clearHighlight();
          setAction(msg.last_action);
          render(msg.board); setDice(null);
          setText(`Waiting for ${oppPlayerName}…`);
          break;

        case 'no_moves':
          clearHighlight();
          setAction(msg.last_action);
          render(msg.board); setDice(null);
          break;

        case 'your_turn':
          clearHighlight();
          setAction(msg.last_action);
          render(msg.board); setDice(msg.roll);
          setText(`Your turn  ·  rolled ${msg.roll}  ·  pick a piece`);
          highlight(msg.valid_moves);
          break;

        case 'game_over': {
          clearHighlight();
          setAction(msg.last_action);
          render(msg.board);
          const won = msg.winner_idx === myIdx;
          const tx = document.getElementById('go-text');
          tx.textContent = won ? 'VICTORY' : 'DEFEAT';
          tx.className = won ? 'win-text' : 'lose-text';
          document.getElementById('gameover').classList.add('show');
          break;
        }
      }
    }

    /* ── WebSocket ───────────────────────────────────── */
    const dotEl = document.getElementById('dot');
    const wsUrl = `ws://${window.location.host}/ws`;
    let ws;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {};  // lobby msg will confirm connection
      ws.onclose = () => {
        dotEl.className = 'dot-conn err';
        dotEl.textContent = '⬤ disconnected';
        setLobbyStatus('Connection lost. Refresh to reconnect.');
      };
      ws.onerror = () => {
        dotEl.className = 'dot-conn err';
        dotEl.textContent = '⬤ error';
      };
      ws.onmessage = e => handle(JSON.parse(e.data));
    }

    connect();
  </script>
</body>
</html>
